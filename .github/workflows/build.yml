name: Build release binaries

on:
  push:
    branches: [ main, master ]
  pull_request:
    paths-ignore:
      - 'Readme.md'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Build release
        run: cargo build --release

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: SystemMonitor-${{ matrix.os }}
          path: ${{ runner.os == 'Windows' && 'target/release/SystemMonitor.exe' || 'target/release/SystemMonitor' }}

  build-debian:
    runs-on: ubuntu-latest
    container: debian:12
    steps:
      - name: Install dependencies
        run: apt-get update -qq && apt-get install -y -qq curl build-essential git ca-certificates

      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Build release
        run: cargo build --release

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: SystemMonitor-debian
          path: target/release/SystemMonitor

  release:
    needs: [build, build-debian]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename artifacts for release
        run: |
          set -e
          mkdir -p release-files
          # Ubuntu artifact
          cp artifacts/SystemMonitor-ubuntu-latest/SystemMonitor release-files/SystemMonitor-ubuntu-latest
          # macOS artifact
          cp artifacts/SystemMonitor-macos-latest/SystemMonitor release-files/SystemMonitor-macos-latest
          # Windows artifact
          cp artifacts/SystemMonitor-windows-latest/SystemMonitor.exe release-files/SystemMonitor-windows-latest.exe
          # Debian artifact
          cp artifacts/SystemMonitor-debian/SystemMonitor release-files/SystemMonitor-debian
          echo "✓ All artifacts copied successfully"
          ls -la release-files/

      - name: Create Release
        uses: softprops/action-gh-release@v2.0.8
        with:
          files: release-files/*
          tag_name: build-${{ github.run_id }}
          name: Build ${{ github.run_number }} - ${{ github.sha }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
